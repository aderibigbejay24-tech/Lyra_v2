[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "UP", "N", "S", "B", "A", "C4", "RET", "SIM"]
ignore = ["S101", "S603", "S607"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing"

[tool.coverage.run]
omit = ["src/prompts/*"]
