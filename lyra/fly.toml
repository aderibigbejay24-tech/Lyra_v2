app = "lyra-lead-guardian"
primary_region = "yyz"   # Toronto — closest to Alberta

[build]

[env]
  APP_ENV = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "10m"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"
